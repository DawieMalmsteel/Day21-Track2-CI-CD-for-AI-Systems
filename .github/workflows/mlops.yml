name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # JOB 1: Chay unit tests tren du lieu ao (khong can GCS)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # JOB 2: Huan luyen mo hinh tren du lieu thuc, upload artifact len cloud storage
  train:
    name: Train
    needs: test              # Chi chay khi job test qua
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # For AWS, we set the credentials from the secret and set the endpoint URL for ministack
        run: |
          # Parse the JSON secret to get AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY
          export AWS_ACCESS_KEY_ID=${{ fromJSON(secrets.CLOUD_CREDENTIALS).aws_access_key_id }}
          export AWS_SECRET_ACCESS_KEY=${{ fromJSON(secrets.CLOUD_CREDENTIALS).aws_secret_access_key }}
          # Set the region and endpoint URL for ministack
          export AWS_DEFAULT_REGION=us-east-1
          export AWS_ENDPOINT_URL=http://host.docker.internal:4566
          # For S3 path style requests
          export AWS_S3_ADDRESSING=path
          # Also set these for boto3 in the download_model function
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL=$AWS_ENDPOINT_URL" >> $GITHUB_ENV
          echo "AWS_S3_ADDRESSING=$AWS_S3_ADDRESSING" >> $GITHUB_ENV

      - name: Pull data with DVC
        # Configure DVC remote to use our ministack S3 endpoint
        run: |
          # Set the DVC remote endpoint to ministack
          dvc remote modify myremote endpointurl http://host.docker.internal:4566
          # Pull the data
          dvc pull

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          # Read the accuracy from outputs/metrics.json and set it as an output
          ACCURACY=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACCURACY" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        # Upload the model to S3 using boto3
        run: |
          python - <<'EOF'
          import boto3
          import os
          bucket = os.environ["CLOUD_BUCKET"]
          s3_client = boto3.client(
              's3',
              endpoint_url=os.getenv('AWS_ENDPOINT_URL', 'http://localhost:4566'),
              aws_access_key_id=os.getenv('AWS_ACCESS_KEY_ID'),
              aws_secret_access_key=os.getenv('AWS_SECRET_ACCESS_KEY')
          )
          s3_client.upload_file('models/model.pkl', bucket, 'models/latest/model.pkl')
          print(f"Uploaded model.pkl to s3://{bucket}/models/latest/model.pkl")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # JOB 3: Kiem tra chat luong - chi cho phep deploy khi accuracy >= 0.70
  eval:
    name: Eval
    needs: train             # Chi chay khi job train qua
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          # Get the accuracy from the train job output
          ACCURACY="${{ needs.train.outputs.accuracy }}"
          echo "Accuracy from train job: $ACCURACY"
          # Convert to float and check if it's >= 0.70
          python - <<'EOF'
          import sys
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          if accuracy < 0.70:
              print(f"Accuracy {accuracy} is below threshold 0.70. Failing the job.")
              sys.exit(1)
          else:
              print(f"Accuracy {accuracy} meets threshold 0.70. Continuing.")
          EOF

  # JOB 4: Trien khai sau khi eval gate qua
  deploy:
    name: Deploy
    needs: eval              # Chi chay khi job eval qua
    runs-on: ubuntu-latest
    steps:
      - name: Deploy (placeholder)
        run: |
          echo "Deploy job would run here. Skipping for now."
          echo "In a real setup, this would restart the service on the VM and check the health endpoint."
          exit 0